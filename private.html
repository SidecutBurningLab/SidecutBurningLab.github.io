<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>月曆</title>
    <!-- CSS -->
    <style>
        body {
            /* height: 100vh; */
            display: grid;
            place-items: center;
            background-color: rgb(102, 132, 153);
        }

        .calendar {
            height: 1100px;
            width: 940px;
            background-color: rgb(102, 132, 153);
            border: 1px solid rgb(11, 34, 117);
            border-radius: 30px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .calendar-header {
            text-align: center;
            font-size: 25px;
            color: rgb(11, 34, 117);
            padding: 10px;
        }

        .year-picker {
            border-radius: 10px;
            cursor: pointer;
        }

        .month-picker {
            height:50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month {
            width: 200px;
        }

        .month-change {
            width: 200px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            margin: 0 10px;
            cursor: pointer;
        }

        .calendar-week-day {
            height: 40px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            font-weight: 600;
        }

        .calendar-week-day div {
            display: grid;
            text-align: center;
            /* place-items: center; */
            color: rgb(11, 34, 117);
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            font-size: 25px;
            color: rgb(11, 34, 117);
        }

        .calendar-days div {
            /* width: 70px; */
            height: 150px;
            text-align: center;
            /* display: flex; */
            /* align-items: center; */
            /* justify-content: center; */
            /* margin-left: 8px; */
            position: relative;
            cursor: pointer;
            /* animation: to-top 1s forwards; */
            border-radius: 10%;
            border: 1px solid rgb(11, 34, 117);
            background-color: rgb(102, 132, 153);
        }

        .calendar-days div:hover {
            /* transition: 0.5s ease-in-out; */
            /* width: 50px; */
            /* height: 50px; */
            /* width: 100%; */
            /* height: 100%; */
            border-radius: 10%;
            /* border: 1px solid rgb(255, 234, 0); */
            background-color: rgb(238, 238, 238);
        }

        .calendar-days div.calendar-content {
            height: 0px;
            border: 0px;
            font-size: 9pt;
            text-align: start;
            margin-left: 8px;
        }

        .calendar-days div.calendar-full {
            height: 0;
            border: 0px;
            font-size: 10pt;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-days div span {
            position: absolute;
        }

        .calendar-days div.prev-date,
        .calendar-days div.prev-date:hover {
            background-color: rgb(190, 190, 190);
            color: white;
            /* border-radius: 50%; */
        }
    </style>

</head>

<body>
    <div class="calendar">

        <div class="calendar-header">
            <!-- 年 -->
            <span class="year-picker" id="year">2022</span>
            <!-- 月 -->
            <div class="month-picker">
                <span class="month-change" id="prev-month">
                    <pre><</pre>
                </span>
                <span class="month" id="month">February</span>
                <span class="month-change" id="next-month">
                    <pre>></pre>
                </span>
            </div>

        </div>

        <div class="calendar-body">
            <!-- 日 -->

            <!-- 星期 -->
            <div class="calendar-week-day">
                <div>日</div>
                <div>一</div>
                <div>二</div>
                <div>三</div>
                <div>四</div>
                <div>五</div>
                <div>六</div>
            </div>
            <!-- 日期 -->
            <div class="calendar-days">

            </div>

        </div>

        <div class="month-list"></div>

    </div>

    <!---------------------------------------------------- JavaScript ---------------------------------------------------->
    <script >
        let ALLOW_SHOW_RANGE_EXCEED_SEASON = false;
        let DAY_TS = 24 * 60 * 60 * 1000;
        let SEASON_BEGIN = null;
        let SEASON_END = null;
        let MONTH_NAMES = [];
        let MIN_DISPLAY_NUM = {};
        let SERVICE_DISPLAY_UNIT = {};
        // 可以看到名額的時間
        let SERVICE_VISIBLE_TS = {}
        // 服務開放的時間
        let SERVICE_OPEN_TS = {}
        let FORCE_ALL_SERVICE_VISIBLE = false;   // 要看私人/團體課請在calendar.html中自行改成true.

		let overallAvailableSchedule = {}

        const SEASON_CONFIG_URL = 'https://calendar-read-server-752313138516.asia-east1.run.app/calendar/season-config';
        const CALENDAR_DATA_URL = 'https://calendar-read-server-752313138516.asia-east1.run.app/calendar/class-calendar-data';
        async function loadCalendarData() {
        const res = await fetch(CALENDAR_DATA_URL);
            if (!res.ok) {
                throw new Error(`Failed to load calendar data: ${res.status}`);
            }

            const data = await res.json();
            overallAvailableSchedule = data || {};
        }
        async function loadSeasonConfig() {
            const res = await fetch(SEASON_CONFIG_URL);
            if (!res.ok) {
                throw new Error(`Failed to load season config: ${res.status}`);
            }

            const config = await res.json();

            ALLOW_SHOW_RANGE_EXCEED_SEASON = config.ALLOW_SHOW_RANGE_EXCEED_SEASON ?? false;
            DAY_TS = 24 * 60 * 60 * 1000;
            SEASON_BEGIN = new Date(config.SEASON_BEGIN);
            SEASON_END = new Date(config.SEASON_END);
            MONTH_NAMES = config.MONTH_NAMES || [];
            MIN_DISPLAY_NUM = config.MIN_DISPLAY_NUM || {};
            SERVICE_DISPLAY_UNIT = config.SERVICE_DISPLAY_UNIT || {};
            FORCE_ALL_SERVICE_VISIBLE = config.FORCE_ALL_SERVICE_VISIBLE ?? false;

            const now = new Date();
            const todayTs = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            SERVICE_VISIBLE_TS = {};
            for (const key of Object.keys(config.SERVICE_VISIBLE_TS || {})) {
                const raw = config.SERVICE_VISIBLE_TS[key];
                SERVICE_VISIBLE_TS[key] = raw === 'dynamic_today' ? todayTs : new Date(raw).getTime();
            }

            SERVICE_OPEN_TS = {};
            for (const key of Object.keys(config.SERVICE_OPEN_TS || {})) {
                SERVICE_OPEN_TS[key] = new Date(config.SERVICE_OPEN_TS[key]).getTime();
            }
        }
        async function bootstrap() {
            try {
                await loadSeasonConfig();
                await loadCalendarData();
                main();
            } catch (err) {
                console.error(err);
                alert('載入行事曆設定失敗');
            }
        }

        bootstrap();
        // 設定閏月的規則 https://xiwan.io/archive/most-efficient-leap-year-algorithm.html
        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0 && year % 400 !== 0) || (year % 100 === 0 && year % 400 === 0);
        }

        // 抓閏月
        function getFebDays(year) {
            return isLeapYear(year) ? 29 : 28;
        }

        function getDaysOfMonth(month, year) {
            let daysOfMonth = [31, getFebDays(year), 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            return daysOfMonth[month];
        }
        function main () {
            // 抓calendar css
            let calendar = document.querySelector('.calendar');

            // 產生年月
            generateCalendar = (month, year) => {
                let calendarDays = calendar.querySelector('.calendar-days');
                let calendarHeaderYear = calendar.querySelector('#year');
                let calendarHeaderMonth = calendar.querySelector('#month');

                calendarDays.innerHTML = '';

                // 抓現在的日期
                let currDate = new Date();

                let currMonth = `${MONTH_NAMES[month]}`;
                calendarHeaderMonth.innerHTML = currMonth;
                calendarHeaderYear.innerHTML = year;

                let firstDay = new Date(year, month, 1);
                let toDay = getDaysOfMonth(month, year) + firstDay.getDay() - 1;
                // toDay = Math.ceil((toDay+1) / 7) * 7 - 1

                let yearData = overallAvailableSchedule[year] ? overallAvailableSchedule[year] : {};
                let monthData = yearData[month+1] ? yearData[month+1] : {};

                for (let i = 0; i <= toDay; i++) {
                    let dayDiv = document.createElement('div');
                    // if (i >= firstDay.getDay() && i <= getDaysOfMonth[month] + firstDay.getDay() - 1) {
                    let day = i - firstDay.getDay() + 1;
                    let dayTs = new Date(year, month, day);
                    let dayData = monthData[day] ? monthData[day] : {};
                    if ( day >= 1 ) {
                        dayDiv.innerHTML = day;
                        if ( dayTs > SEASON_BEGIN.getTime() - DAY_TS && 
                             dayTs <= SEASON_END.getTime() && 
                             dayTs > currDate.getTime() ) {
                            let servicesTypes = ["私人課"/*,"團體課"*/];
                            let titleStrings = ["<font color='001a1a'>私人課名額:</font><br>","<font color='001a1a'>團體課名額:</font><br>"];
                            let displayResult = ["", ""];
                            let isFull = true;
                            for ( let j = 0; j < servicesTypes.length; j++ ) {
                                let servicesType = servicesTypes[j];
                                if ( currDate.getTime() < SERVICE_VISIBLE_TS[servicesType] && !FORCE_ALL_SERVICE_VISIBLE ) {
                                    continue;
                                }
                                if ( dayTs < SERVICE_OPEN_TS[servicesType] && !FORCE_ALL_SERVICE_VISIBLE ) {
                                    continue;
                                }
                                let available = dayData[servicesType] ? dayData[servicesType] : { "ski": 0, "snowboard":0 };
                                if ( available["ski"] >= MIN_DISPLAY_NUM[servicesType] || available["snowboard"] >= MIN_DISPLAY_NUM[servicesType] ) {
                                    displayResult[j] = titleStrings[j];
                                    if ( /*available["ski"] !== 0*/false ) {
                                        displayResult[j] += "Ski: " + available["ski"] + SERVICE_DISPLAY_UNIT[servicesType];
                                    }
                                    if ( available["snowboard"] !== 0 ) {
                                        if ( /*available["ski"] !== 0*/false ) {
                                            displayResult[j] += "<br>";
                                        }
                                        displayResult[j] += "Snowboard: " + available["snowboard"] + SERVICE_DISPLAY_UNIT[servicesType];
                                    }
                                    displayResult[j] += "<br>"
                                    isFull = false;
                                }
                            }
                            if ( isFull ) {
                                dayDiv.innerHTML += "<div class=\"calendar-full\">" + "<br>額滿";
                            } else {
                                dayDiv.innerHTML += "<div class=\"calendar-content\">" + displayResult[0] + displayResult[1];
                                if ( dayTs > currDate.getTime() ) {
                                    dayDiv.onclick = () => {
                                        let yearStr = year.toString();
                                        let monthStr = (month+1).toString().padStart(2, '0');
                                        let dayStr = day.toString().padStart(2, '0');
                                        window.open("https://docs.google.com/forms/d/e/1FAIpQLSfl_Y29zKfT2SwbOucZR2Qs4a4Dxj1uVErFx1oDwn1Lh5Cb3Q/viewform?usp=pp_url&entry.160739420=" + yearStr + "-" + monthStr + "-" + dayStr, "_blank");
                                    }
                                }
                            }
                        }
                        if (dayTs <= currDate.getTime() || 
                            dayTs < SEASON_BEGIN.getTime() ||
                            dayTs > SEASON_END.getTime()) {
                            dayDiv.classList.add('prev-date');
                        }
                    }
                    calendarDays.appendChild(dayDiv);
                }
            }

            let currDate = new Date();
            let seasonBeginMonth = new Date(SEASON_BEGIN.getFullYear(), SEASON_BEGIN.getMonth(), 1);
            let seasonEndMonth = new Date(SEASON_END.getFullYear(), SEASON_END.getMonth(), getDaysOfMonth(SEASON_END.getMonth(), SEASON_END.getFullYear()));
            let isCurrentDayinSeason = currDate.getTime() > seasonBeginMonth.getTime();
            let currMonth = { value: isCurrentDayinSeason ? currDate.getMonth() : seasonBeginMonth.getMonth() };
            let currYear = { value: isCurrentDayinSeason ? currDate.getFullYear() : seasonBeginMonth.getFullYear() };

            generateCalendar(currMonth.value, currYear.value);

            document.querySelector('#prev-month').onclick = () => {
                let nextYear = currYear.value;
                let nextMonth = currMonth.value - 1;
                if ( nextMonth < 0 ) {
                    nextMonth = nextMonth + 12;
                    nextYear--;
                }
                let diff = (nextYear - seasonBeginMonth.getFullYear()) * 12 + nextMonth - seasonBeginMonth.getMonth();
                if ( ALLOW_SHOW_RANGE_EXCEED_SEASON || diff >= 0 ) {
                    currMonth.value = nextMonth;
                    currYear.value = nextYear;
                    generateCalendar(currMonth.value, currYear.value);
                }
            }

            document.querySelector('#next-month').onclick = () => {
                let nextYear = currYear.value;
                let nextMonth = currMonth.value + 1;
                if ( nextMonth >= 12 ) {
                    nextMonth %= 12;
                    nextYear++;
                }
                let diff = (seasonEndMonth.getFullYear() - nextYear) * 12 + seasonEndMonth.getMonth() - nextMonth;
                if ( ALLOW_SHOW_RANGE_EXCEED_SEASON || diff >= 0 ) {
                    currMonth.value = nextMonth;
                    currYear.value = nextYear;
                    generateCalendar(currMonth.value, currYear.value);
                }
            }
        };
    </script>
</body>

</html>
